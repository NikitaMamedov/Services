spring:
  datasource:
    url: ${PG_URL}
    username: ${PG_USER}
    password: ${PG_PASS}

  sql:
    init:
      mode: always

  jpa:
    hibernate:
      ddl-auto: none

server:
  port: 8080
  ssl:
    enabled: true
    key-store: classpath:ssl/quiz-server.p12
    key-store-type: PKCS12
    key-store-password: ${TLS_KEYSTORE_PASSWORD}
    key-alias: quiz-server